<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Comidas — NutriMAx</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .day-total-bar {
      background: var(--white); border-radius: var(--radius);
      border: 1px solid var(--gray-100); padding: 20px 24px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .meal-section { margin-bottom: 20px; }
    .meal-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--gray-50);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border: 1px solid var(--gray-200); border-bottom: none;
    }
    .meal-section-title { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .meal-section-cals { font-size:13px; font-weight:600; color:var(--green-600); }
    .meal-section-body {
      border: 1px solid var(--gray-200); border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      overflow: hidden; background: var(--white);
    }
    .search-results { position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:50;
      background:var(--white); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg);
      border:1px solid var(--gray-200); max-height:300px; overflow-y:auto; }
    .search-result-item { padding:12px 16px; cursor:pointer; transition:var(--transition);
      display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .search-result-item:hover { background:var(--green-50); }
    .search-result-item:not(:last-child) { border-bottom:1px solid var(--gray-100); }
    .sri-name { font-size:14px; font-weight:600; }
    .sri-meta { font-size:12px; color:var(--gray-500); }
  </style>
</head>
<body>
<button class="mobile-nav-toggle" id="mobileToggle">☰</button>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header flex justify-between items-center" style="flex-wrap:wrap;gap:12px;">
      <div>
        <h1 class="page-title">Registro de Comidas 📝</h1>
        <p class="page-subtitle" id="dateLabel"></p>
      </div>
    </div>

    <!-- Day totals bar -->
    <div class="day-total-bar">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px;">
        <div style="font-size:15px;font-weight:700;color:var(--gray-800);">Totales del día</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;" id="dayBadges"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;" id="dayProgressBars"></div>
    </div>

    <!-- Meal sections -->
    <div id="mealSections"></div>

    <!-- ADD FOOD MODAL TRIGGER (floats per meal) -->
  </main>
</div>

<!-- Add Food Modal -->
<div class="modal-overlay" id="addFoodModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="addFoodModalTitle">Añadir comida</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Search -->
      <div class="form-group mb-16" style="position:relative;">
        <label class="form-label">Buscar alimento o receta</label>
        <div class="search-bar" id="foodSearchBar">
          <span class="search-icon">🔍</span>
          <input type="text" id="foodSearchInput" placeholder="Ej: Pollo, Avena, Ensalada..." autocomplete="off" />
        </div>
        <div class="search-results hidden" id="searchResults"></div>
      </div>

      <!-- Custom entry -->
      <div class="divider-text mb-12 mt-8">o ingresa manualmente</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group">
          <label class="form-label">Nombre del alimento</label>
          <input class="form-input" type="text" id="customName" placeholder="Ej: Arroz con pollo" />
        </div>
        <div class="grid-2" style="gap:12px;">
          <div class="form-group">
            <label class="form-label">Calorías (kcal)</label>
            <input class="form-input" type="number" id="customCals" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Proteína (g)</label>
            <input class="form-input" type="number" id="customProtein" placeholder="0" min="0" />
          </div>
        </div>
        <div class="grid-2" style="gap:12px;">
          <div class="form-group">
            <label class="form-label">Carbos (g)</label>
            <input class="form-input" type="number" id="customCarbs" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Grasas (g)</label>
            <input class="form-input" type="number" id="customFat" placeholder="0" min="0" />
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmAddFood()">Añadir 🥗</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
if (!requireAuth()) throw new Error('not logged in');
initSidebar('food-log');
document.getElementById('dateLabel').textContent = formatDate(todayKey());

let activeMealType = 'Desayuno';
const goals = getGoals();
const targets = goals?.targets ?? { calories: 2000, protein: 150, carbs: 225, fat: 55 };

function renderPage() {
  const log    = getTodayLog();
  const totals = getDailyTotals(log);
  renderTotals(totals);
  renderMealSections(log);
}

function renderTotals(totals) {
  const badges = [
    { label:'Calorías', val: totals.calories, target: targets.calories, unit:'kcal', bg:'var(--green-100)', color:'var(--green-700)' },
    { label:'Proteína', val: totals.protein,  target: targets.protein,  unit:'g', bg:'#ede9fe', color:'#6d28d9' },
    { label:'Carbos',   val: totals.carbs,    target: targets.carbs,    unit:'g', bg:'#fef3c7', color:'#b45309' },
    { label:'Grasas',   val: totals.fat,      target: targets.fat,      unit:'g', bg:'#ffe4e6', color:'#be123c' },
  ];
  document.getElementById('dayBadges').innerHTML = badges.map(b => `
    <span style="padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;background:${b.bg};color:${b.color};">
      ${b.val} / ${b.target} ${b.unit}
    </span>`).join('');

  const bars = [
    { label:'Calorías', val: totals.calories, target: targets.calories, cls:''        },
    { label:'Proteína', val: totals.protein,  target: targets.protein,  cls:'protein' },
    { label:'Carbos',   val: totals.carbs,    target: targets.carbs,    cls:'carbs'   },
    { label:'Grasas',   val: totals.fat,      target: targets.fat,      cls:'fat'     },
  ];
  document.getElementById('dayProgressBars').innerHTML = bars.map(b => `
    <div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="font-weight:600;color:var(--gray-700);">${b.label}</span>
        <span style="color:var(--gray-500);">${pct(b.val, b.target)}%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill ${b.cls}" style="width:${pct(b.val,b.target)}%"></div></div>
    </div>`).join('');
}

function renderMealSections(log) {
  const entries = log.entries ?? [];
  const byMeal = {};
  MEAL_TYPES.forEach(t => byMeal[t] = []);
  entries.forEach(e => { if (byMeal[e.mealType] !== undefined) byMeal[e.mealType].push(e); });

  document.getElementById('mealSections').innerHTML = MEAL_TYPES.map(type => {
    const items = byMeal[type];
    const total = items.reduce((s, e) => s + (e.calories || 0), 0);
    const rows = items.length ? items.map(e => `
      <div class="food-row">
        <div class="food-row-icon">${MEAL_ICONS[type]}</div>
        <div class="food-row-info">
          <div class="food-row-name">${e.name}</div>
          <div class="food-row-meta">Prot: ${e.protein}g · Carbs: ${e.carbs}g · Grasas: ${e.fat}g</div>
        </div>
        <div class="food-row-cals">${e.calories} kcal</div>
        <button class="food-row-del" onclick="removeEntry(${e.id})" title="Eliminar">✕</button>
      </div>`).join('')
      : `<div style="padding:18px 16px;font-size:13px;color:var(--gray-400);">Sin alimentos registrados aún.</div>`;

    return `<div class="meal-section">
      <div class="meal-section-header">
        <span class="meal-section-title">${MEAL_ICONS[type]} ${type}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="meal-section-cals">${total} kcal</span>
          <button class="btn btn-primary btn-sm" onclick="openAddModal('${type}')">+ Añadir</button>
        </div>
      </div>
      <div class="meal-section-body">${rows}</div>
    </div>`;
  }).join('');
}

function removeEntry(id) {
  removeFoodEntry(id);
  renderPage();
  showToast('Alimento eliminado', 'success');
}

// ── Modal ──
function openAddModal(mealType) {
  activeMealType = mealType;
  document.getElementById('addFoodModalTitle').textContent = `Agregar a ${MEAL_ICONS[mealType]} ${mealType}`;
  clearModal();
  document.getElementById('addFoodModal').classList.add('open');
  setTimeout(() => document.getElementById('foodSearchInput').focus(), 100);
}
function closeModal() {
  document.getElementById('addFoodModal').classList.remove('open');
  document.getElementById('searchResults').classList.add('hidden');
}
function clearModal() {
  ['customName','customCals','customProtein','customCarbs','customFat'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('foodSearchInput').value = '';
}

// ── Search ──
document.getElementById('foodSearchInput').addEventListener('input', function() {
  const q = this.value.trim();
  const resultsEl = document.getElementById('searchResults');
  if (!q) { resultsEl.classList.add('hidden'); return; }
  const results = searchRecipes(q);
  if (!results.length) { resultsEl.innerHTML = '<div style="padding:14px;color:var(--gray-400);font-size:13px;">Sin resultados</div>'; resultsEl.classList.remove('hidden'); return; }
  resultsEl.innerHTML = results.slice(0, 8).map(r => `
    <div class="search-result-item" onclick="selectRecipe(${JSON.stringify(r).replace(/"/g,'&quot;')})">
      <div>
        <div class="sri-name">${r.emoji ?? '🍽️'} ${r.name}</div>
        <div class="sri-meta">Prot: ${r.protein}g · Carbs: ${r.carbs}g · Grasas: ${r.fat}g</div>
      </div>
      <span style="font-size:14px;font-weight:700;color:var(--green-600);">${r.calories} kcal</span>
    </div>`).join('');
  resultsEl.classList.remove('hidden');
});

function selectRecipe(r) {
  document.getElementById('customName').value    = r.name;
  document.getElementById('customCals').value    = r.calories;
  document.getElementById('customProtein').value = r.protein;
  document.getElementById('customCarbs').value   = r.carbs;
  document.getElementById('customFat').value     = r.fat;
  document.getElementById('foodSearchInput').value = '';
  document.getElementById('searchResults').classList.add('hidden');
  showToast('Receta seleccionada ✅', 'success');
}

function confirmAddFood() {
  const name    = document.getElementById('customName').value.trim();
  const calories = parseFloat(document.getElementById('customCals').value) || 0;
  const protein  = parseFloat(document.getElementById('customProtein').value) || 0;
  const carbs    = parseFloat(document.getElementById('customCarbs').value) || 0;
  const fat      = parseFloat(document.getElementById('customFat').value) || 0;
  if (!name) { showToast('Ingresa un nombre para el alimento', 'error'); return; }
  if (!calories) { showToast('Ingresa las calorías', 'error'); return; }
  addFoodEntry({ mealType: activeMealType, name, calories, protein, carbs, fat });
  closeModal();
  renderPage();
  showToast(`${name} añadido a ${activeMealType} 🎉`, 'success');
}

// Close modal on overlay click
document.getElementById('addFoodModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close search on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#addFoodModal')) return;
  if (!e.target.closest('#foodSearchBar') && !e.target.closest('#searchResults')) {
    document.getElementById('searchResults').classList.add('hidden');
  }
});

renderPage();
</script>
</body>
</html>
